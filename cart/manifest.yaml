apiVersion: v1
kind: ConfigMap
metadata:
  name: cart
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: cart
data:
  REDIS_HOST: "redis"
  CATALOGUE_HOST: "catalogue"
  CATALOGUE_PORT: "8080"
---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: cart
  namespace: roboshop
  # these labels are replica set labels
  labels:
    project: roboshop
    tier: backend
    component: cart
spec:
  replicas: 1
  selector:
  # using these labels replicaset selects the pods
    matchLabels:
      project: roboshop
      tier: backend
      component: cart
  # this is pod definition , pod is subset of replica set
  template:
    metadata:
      labels:
        project: roboshop
        tier: backend
        component: cart
    spec:
      containers:
      - name: cart
        image: joindevops/cart:1.4.0
        imagePullPolicy: Always # safe to pull everytime, there maybe images with same version rebuilt and pushed
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          # httpGet:
          #   path: /health
          #   port: 8080
          tcpSocket:
            port: 8080
          failureThreshold: 2
          periodSeconds: 10
          initialDelaySeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 2
          periodSeconds: 10
        envFrom:
        - configMapRef:
            name: cart
---
apiVersion: v1
kind: Service
metadata:
  name: cart
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: cart
spec:
  selector:
    # labels are used as selectors
    project: roboshop
    tier: backend
    component: cart
  ports:
  - protocol: TCP
    port: 8080 # service port
    targetPort: 8080  # container port
        
