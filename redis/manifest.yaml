apiVersion: apps/v1
kind: Deployment

metadata:
  name: redis
  namespace: roboshop
  # these labels are replica set labels
  labels:
    project: roboshop
    tier: db
    component: redis
spec:
  replicas: 1
  selector:
  # using these labels replicaset selects the pods
    matchLabels:
      project: roboshop
      tier: db
      component: redis
  # this is pod definition , pod is subset of replica set
  template:
    metadata:
      labels:
        project: roboshop
        tier: db
        component: redis
    spec:
      containers:
      - name: redis
        image: redis:7.0
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: redis
spec:
  selector:
    # labels are used as selectors
    project: roboshop
    tier: db
    component: redis
  ports:
  - protocol: TCP
    port: 6779  # service port
    targetPort: 6379  # container port
        
