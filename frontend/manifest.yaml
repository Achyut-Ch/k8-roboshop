
apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: roboshop
  # these labels are replica set labels
  labels:
    project: roboshop
    tier: frontend
    component: frontend
spec:
  replicas: 1
  selector:
  # using these labels replicaset selects the pods
    matchLabels:
      project: roboshop
      tier: frontend
      component: frontend
  # this is pod definition , pod is subset of replica set
  template:
    metadata:
      labels:
        project: roboshop
        tier: frontend
        component: frontend
    spec:
      containers:
      - name: frontend
        image: joindevops/frontend:1.4.0
        imagePullPolicy: Always # safe to pull everytime, there maybe images with same version rebuilt and pushed
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          # httpGet:
          #   path: /health
          #   port: 8080
          tcpSocket:
            port: 80
          failureThreshold: 2
          periodSeconds: 10
          initialDelaySeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 80
          failureThreshold: 2
          periodSeconds: 10
     
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: roboshop
  labels:
    project: roboshop
    tier: frontend
    component: frontend
spec:
  type: LoadBalancer
  selector:
    # labels are used as selectors
    project: roboshop
    tier: frontend
    component: frontend
  ports:
  - protocol: TCP
    port: 80 # service port
    targetPort: 80  # container port
        
